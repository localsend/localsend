name: localsend_app
description: An open source cross-platform alternative to AirDrop
homepage: https://localsend.org/
publish_to: "none"

version: 1.17.0+58

environment:
  flutter: ^3.41.0
  sdk: ^3.11.0

dependencies:
  basic_utils: 5.8.2
  bitsdojo_window: ^0.1.6
  collection: ^1.17.2 # allow newer versions, so it can compile with newer Flutter versions
  connectivity_plus: 7.2.0
  convert: 3.1.2
  dart_mappable: 4.8.0
  desktop_drop: 0.7.1
  device_apps: 2.2.0
  device_info_plus: 12.4.0
  dynamic_color: 1.8.1
  file_picker: 11.0.2
  file_selector: 1.1.0
  flutter:
    sdk: flutter
  flutter_displaymode: 0.7.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown: 0.7.7+1
  freezed_annotation: 3.1.0
  gal: 2.3.2
  glob: 2.1.3
  image: 4.8.0
  image_picker: 1.2.3
  in_app_purchase: 3.3.0 # [FOSS_REMOVE]
  intl: ^0.20.2 # allow newer versions, so it can compile with newer Flutter versions
  legalize: 1.2.2
  local_hero: 0.3.0
  localsend_isolates:
    path: ../packages/localsend_isolates
  logging: 1.3.0
  # https://github.com/NightFeather0615/macos_dock_progress/issues/1
  # macos_dock_progress: 1.1.0
  mime: 2.0.0
  moform: 0.2.11
  nanoid2: 2.0.1
  network_info_plus: 7.0.0
  open_dir: 0.0.2+1
  open_filex: 4.7.0
  package_info_plus: 9.0.1
  pasteboard: 0.3.0
  path: 1.9.1
  path_provider: 2.1.6
  path_provider_foundation: 2.6.0
  permission_handler: 12.0.3
  pretty_qr_code: 3.6.0
  refena_flutter: 3.2.1
  refena_inspector_client: 2.1.1
  routerino: 0.8.1
  saf_stream: 2.0.0
  screen_retriever: 0.2.2
  share_handler: 0.0.22
  shared_preferences: 2.5.5
  shared_preferences_platform_interface: any
  slang: 4.18.0
  slang_flutter: 4.18.0
  system_settings_2: 3.0.2
  tray_manager: 0.5.3
  uri_content: 3.1.1
  url_launcher: 6.3.2
  uuid: 4.5.3
  wakelock_plus: 1.5.2
  wechat_assets_picker: 10.1.2
  win32_registry: 2.1.0
  window_manager: 0.5.2
  windows_taskbar: 1.1.2
  yaru: 10.2.0

dev_dependencies:
  build_runner: 2.15.1
  dart_mappable_builder: 4.8.0
  flutter_gen_runner: 5.14.1
  flutter_lints: 6.0.0
  freezed: 3.2.5
  mockito: any
  refena_inspector: 2.1.1
  slang_build_runner: 4.18.0
  test: ^1.30.0

dependency_overrides:
  device_apps:
    # Migrate to another maintained package to fetch installed apps on Android
    git:
      url: https://github.com/Tienisto/device_apps.git
      ref: 5dc7956d938541254d2e175766b3b84ea38bb85b
  pasteboard:
    # This is temporary workaround, wait upstream for update
    git:
      url: https://github.com/Seidko/flutter-plugins.git
      ref: 58748dae405df5e68a131e4905d48e75d0624be2
      path: packages/pasteboard
  permission_handler_windows:
    # Remove windows support as it causes trouble with Windows 7
    # https://github.com/Baseflow/flutter-permission-handler/issues/1034
    git:
      url: https://github.com/localsend/permission_handler_windows_noop.git
      ref: 2dadd8afbf81e0e3e4791d7144e689555e58f649

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/web/
    - assets/CHANGELOG.md

flutter_gen:
  line_length: 150
