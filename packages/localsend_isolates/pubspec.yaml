name: localsend_isolates
description: LocalSend network isolates and Rust bindings
publish_to: "none"

version: 0.0.1

environment:
  flutter: ^3.41.0
  sdk: ^3.11.0

dependencies:
  collection: ^1.17.2 # allow newer versions, so it can compile with newer Flutter versions
  dart_mappable: 4.8.0
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  freezed_annotation: 3.1.0
  logging: 1.3.0
  mime: 2.0.0
  refena_flutter: 3.2.1
  rust_lib_localsend_app:
    path: rust_builder
  typed_isolates:
    path: ../typed_isolates
  uuid: 4.5.3

dev_dependencies:
  build_runner: 2.15.1
  dart_mappable_builder: 4.8.0
  flutter_lints: 6.0.0
  freezed: 3.2.5
